name: Update release badges

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-release-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Check out badge repo
        uses: actions/checkout@v4

      - name: Check roadmap token
        run: |
          if [ -z "$ROADMAP_BADGE_TOKEN" ]; then
            echo "::error::ROADMAP_BADGE_TOKEN is required to read the private scripts-roadmap repo."
            exit 1
          fi
        env:
          ROADMAP_BADGE_TOKEN: ${{ secrets.ROADMAP_BADGE_TOKEN }}

      - name: Download roadmap source
        run: |
          status="$(
            curl \
              --location \
              --silent \
              --show-error \
              --write-out "%{http_code}" \
              --output /tmp/roadmap-source.tar.gz \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $ROADMAP_BADGE_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/Lunavale-Collective/scripts-roadmap/tarball/main
          )"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Could not download scripts-roadmap with ROADMAP_BADGE_TOKEN. HTTP $status. Make sure the token has contents read access to Lunavale-Collective/scripts-roadmap."
            exit 1
          fi

          mkdir -p roadmap-source
          tar -xzf /tmp/roadmap-source.tar.gz -C roadmap-source --strip-components=1
          test -d roadmap-source/data/issues
        env:
          ROADMAP_BADGE_TOKEN: ${{ secrets.ROADMAP_BADGE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate release badge JSON
        run: python3 scripts/update_release_badges.py
        env:
          ROADMAP_BADGE_TOKEN: ${{ secrets.ROADMAP_BADGE_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          ROADMAP_LOCAL_ROOT: roadmap-source

      - name: Commit badge updates
        run: |
          if git diff --quiet -- .badges/releases .badges/roadmap; then
            echo "No badge changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .badges/releases .badges/roadmap
          git commit -m "Update badge data"
          git push
